name: Validate installer

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Validate Bash syntax
        run: bash -n install.sh install-codex-relay.sh install-relay-images-skill.sh
      - name: Run ShellCheck
        run: shellcheck -x install.sh install-codex-relay.sh install-relay-images-skill.sh
      - name: Validate Relay Images Skill
        run: |
          python3 -m py_compile skills/relay-images/scripts/relay_images.py
          python3 -m unittest -v tests/test_relay_images.py
          bash install-relay-images-skill.sh --verify-local skills/relay-images
      - name: Verify checksum
        run: sha256sum -c SHA256SUMS
      - name: Verify bootstrap installer pin
        run: |
          actual_sha="$(sha256sum install-codex-relay.sh | cut -d' ' -f1)"
          pinned_sha="$(awk -F'"' '$1 == "INSTALLER_SHA256=" { print $2 }' install.sh)"
          test -n "$pinned_sha"
          test "$pinned_sha" = "$actual_sha"
