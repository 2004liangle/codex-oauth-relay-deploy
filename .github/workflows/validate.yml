name: Validate release

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Validate Bash syntax
        run: bash -n install.sh install-codex-relay.sh install-artifact-relay.sh install-relay-images-skill.sh usage-ui/build-plain-zh.sh
      - name: Run ShellCheck
        run: shellcheck -x install.sh install-codex-relay.sh install-artifact-relay.sh install-relay-images-skill.sh usage-ui/build-plain-zh.sh
      - name: Build and validate plain-Chinese usage dashboard
        run: bash usage-ui/build-plain-zh.sh /tmp/usage-ui-dist
      - name: Validate Relay Images Skill
        run: |
          python3 -m py_compile skills/relay-images/scripts/relay_images.py
          python3 -m unittest -v tests/test_relay_images.py tests/test_installer_contracts.py
          bash install-relay-images-skill.sh --verify-local skills/relay-images
      - name: Validate Artifact Relay
        run: |
          python3 -m py_compile artifact-relay/artifact_relay.py
          python3 -m unittest -v tests/test_artifact_relay.py
      - name: Validate Network Monitor
        run: |
          python3 -m py_compile network-monitor/network_monitor.py
          python3 -m unittest -v tests/test_network_monitor.py
      - name: Build and validate portable Agent Skill
        run: |
          python3 -m unittest -v tests/test_relay_artifacts.py tests/test_skill_package.py
          python3 scripts/package_skill.py --output relay-artifacts.zip
          python3 scripts/package_skill.py --verify relay-artifacts.zip
      - name: Verify checksum
        run: sha256sum -c SHA256SUMS
      - name: Verify bootstrap installer pin
        run: |
          actual_sha="$(sha256sum install-codex-relay.sh | cut -d' ' -f1)"
          pinned_sha="$(awk -F'"' '$1 == "INSTALLER_SHA256=" { print $2 }' install.sh)"
          test -n "$pinned_sha"
          test "$pinned_sha" = "$actual_sha"
      - name: Verify usage dashboard package pin
        run: |
          actual_sha="$(sha256sum /tmp/usage-ui-dist/cpa-usage-ui_1.13.2-plain-zh.2.tar.gz | cut -d' ' -f1)"
          pinned_sha="$(awk -F'"' '$1 == "USAGE_UI_SHA256=" { print $2 }' install-codex-relay.sh)"
          test -n "$pinned_sha"
          test "$pinned_sha" = "$actual_sha"
